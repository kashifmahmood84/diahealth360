# Render Blueprint — connect repo at https://dashboard.render.com/blueprints
# Or create a Web Service manually with the same settings below.
services:
  - type: web
    name: diahealth360
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
